---
- hosts:
    - debian
  tasks:
    - name: "Update apt cache"
      ansible.builtin.apt:
        autoclean: true
        update_cache: true
        cache_valid_time: 21600
      become: true
    - name: "Check for upgradable packages"
      ansible.builtin.apt:
        upgrade: true
      become: true
      check_mode: true
